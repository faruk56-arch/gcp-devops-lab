name: CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Auth GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "YOUR_PROVIDER"
        service_account: "YOUR_SA"

    - name: Configure Docker
      run: gcloud auth configure-docker europe-west1-docker.pkg.dev

    - name: Build & Push
      run: |
        docker build -t app .
        docker tag app europe-west1-docker.pkg.dev/YOUR_PROJECT_ID/docker-repo/app:${{ github.sha }}
        docker push europe-west1-docker.pkg.dev/YOUR_PROJECT_ID/docker-repo/app:${{ github.sha }}

    - name: Deploy
      run: |
        sed -i "s|IMAGE_PLACEHOLDER|europe-west1-docker.pkg.dev/YOUR_PROJECT_ID/docker-repo/app:${{ github.sha }}|" k8s/deployment.yaml
        kubectl apply -f k8s/